name: Deploy to Altervista

on:
  push:
    branches:
      - main
    paths:
      - 'site/**'
  workflow_dispatch: # Manual trigger from GitHub UI

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./site

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build:static

      - name: Deploy to Altervista via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ftp.avid4056923.altervista.org
          username: avid4056923
          password: ${{ secrets.ALTERVISTA_FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./site/out/
          server-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.DS_Store
          log-level: standard
          timeout: 60000
